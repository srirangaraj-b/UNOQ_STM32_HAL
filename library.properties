name=UNOQ_STM32_HAL
version=1.0.0
author=Sri Ranga Raj <sreerangaraj387@gmail.com>
maintainer=Shri
sentence=Register-level GPIO, PWM (incl. complementary + dead-time), ADC and input-capture HAL for the STM32U5-based Arduino UNO Q.
paragraph=Direct CMSIS register driver (no HAL/LL dependency) for the Arduino UNO Q's STM32U585 microcontroller. Provides generic PWM setup on any timer/channel (with complementary outputs and dead-time on TIM1/TIM8), fast GPIO read/write, single-channel ADC1 reads, and PWM input capture, plus a ready-made pin table (PA0..PI7) matching the UNO Q silkscreen.
category=Device Control
url=https://github.com/srirangaraj-b/UNOQ_STM32_HAL
architectures=stm32
includes=UNOQ_STM32_HAL.h
